defenses:
- class_id: K-004
  defense_expected: ObRegisterCallbacks should defend BD process handles
  observed: Strips access rights on Process + Thread handles. Even SeDebugPrivilege opens get granted=0x0.
  gap: Only protects what the kernel-mode list says to protect. Same gap as bdprivmon for ProductAgentService.exe.
  bypass_attempts: Confirmed cross-process handle access blocked at every privilege level tested. Bypassable via injection
    BEFORE the target process establishes itself, not after.
