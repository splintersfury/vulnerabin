binary: bddci4.sys
display_name: Bitdefender bddci4 (kernel handle-strip)
description: 'Kernel driver providing the handle-strip layer of BD self-protection. Registers ObRegisterCallbacks for both
  Process and Thread objects and strips ALL access rights from any handle opened to a BD process regardless of caller privilege.
  Confirmed live: OpenProcess(PROCESS_ALL_ACCESS) on a BD process returns a non-null handle but NtQueryObject reports granted=0x0.'
