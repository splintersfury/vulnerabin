defenses:
- class_id: K-004
  defense_expected: ObRegisterCallbacks should defend BD process handles
  observed: 'CORRECTION: bddci4 does NOT implement ObRegisterCallbacks. Process handle protection (granted=0x0)
    observed in live testing is from PPL (Anti-Malware ELAM signing), enforced by Windows kernel, not by
    bddci4. bddci4 provides: process creation monitoring via PsSetCreateProcessNotifyRoutineEx2, CBE anti-tampering,
    ClassifyRedirectEngineAuth minifilter.'
  gap: bddci4 monitors process creation but does NOT strip handle access. PPL protection is at the OS level
    and has known bypass vectors (e.g., Administrator + SeDebugPrivilege can still open PPL-AntiMalware processes
    from another PPL-AntiMalware process, or via kernel exploits).
  bypass_attempts: ObRegisterCallbacks bypass is N/A since bddci4 does not implement it. PPL protection
    blocks standard user injection into BD processes. Alternative attack paths are msgbus IPC relay,
    COM activation, DLL sideloading, or finding a process that is NOT PPL-protected.
