binary: bddci4.sys
display_name: Bitdefender bddci4 (kernel process monitor + CBE + minifilter)
description: 'CRITICAL CORRECTION (2026-05-14): Full decompilation review (1346 functions, 82695 lines) confirms
  bddci4.sys does NOT implement ObRegisterCallbacks. The handle protection observed in live testing (granted=0x0)
  is attributed to PPL (Protected Process Light) with Anti-Malware ELAM signing, enforced by the Windows kernel,
  not by bddci4.sys.

  bddci4.sys actual capabilities:
  1. PsSetCreateProcessNotifyRoutineEx2 — process creation/exit monitoring (FUN_140014e90 -> FUN_140014a58)
  2. CBE (Callback Bypass Evasion) — anti-tampering integrity module checking PsNotify registration integrity
  3. ClassifyRedirectEngineAuth — minifilter classification engine with SELF-ALLOW/BLOCK/ALLOW rules
  4. WdmlibIoCreateDeviceSecure — device creation with proper SDDL (not Everyone)
  5. MmCopyMemory (dynamically resolved) — kernel-mode memory read
  6. KeStackAttachProcess — kernel-mode memory access
  7. Device name: \Device\BDDCI4_4_7'
