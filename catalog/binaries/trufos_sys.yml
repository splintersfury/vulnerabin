  notes: Single primitive; no follow-on read/write chained.
chains:
- id: CHAIN-001
  title: FUN_140042c5c error-path returns IRP->IoStatus.Information (kernel pool address) without zeroing
  source_id: SRC-001
  sink_id: SNK-001
  conditions:
  - Standard user opens FilterConnectCommunicationPort on \TRFCOMMPORT (default minifilter port DACL allows it)
  - FilterSendMessage with a crafted opcode reaches the error path
  - Handler sets lpBytesReturned to IRP->IoStatus.Information (a kernel pool address) instead of zero
  impact: 'KASLR defeat: standard user obtains a NonPagedPool block address'
  cwe:
  - CWE-200
  severity: P3
