binary: trufos.sys
display_name: Bitdefender trufos (file-system minifilter)
description: 'FileSystem minifilter driver. Exposes a communication port `\TRFCOMMPORT` accessed via FilterSendMessage. Engagement
  filed an info-leak: handler returns IRP->IoStatus.Information (a NonPagedPool block address) without zeroing on error path,
  leaking a kernel pool address to standard users. CVE assigned-class but Bitdefender triaged as P3 Not Applicable.'
canonical_path: C:\Windows\System32\drivers\trufos.sys
arch: x64
platform: windows
binary_kind: sys
trust_boundary: kernel (minifilter; user-mode reaches via FilterSendMessage)
