  impact: Arbitrary process spawn as NT AUTHORITY\SYSTEM
  first_seen_version: '27'
  notes: WinVerifyTrust gates this on the resolved exe_path. SYSTEM token comes from bdappsrv's process token.
chains:
- id: CHAIN-001
  title: IsInFolder prefix check accepts traversal segments, allows Microsoft-signed cmd.exe spawn
  source_id: SRC-001
  sink_id: SNK-001
  conditions:
  - 'ExePath::IsInFolder(exe_path, install_folder) returns TRUE: FUN_18000f5d0 line 232 calls wcsncmp(exe_path, install_folder,
    wcslen(install_folder)) without canonicalization. Path normalizer FUN_18000f440 only lowercases, slash-flips, and strips
    quotes — does not call GetFullPathNameW or PathCanonicalize.'
  - 'WinVerifyTrust(exe_path) succeeds: payload is c:\windows\system32\cmd.exe which is Microsoft-Authenticode-signed.'
  - 'Caller passes msgbus same_sign + trusted_client_process rules: peer is a BD-signed process living in the BD install path.'
  impact: SYSTEM process spawn (cmd.exe with full SYSTEM token)
  cwe:
  - CWE-22
  - CWE-269
  severity: P3
  cvss: 5.7 / AV:L/AC:H/PR:L/UI:N/S:U/C:H/I:H/A:H
  status: partial
  confirmed_in_version: '27'
  finding_ref: bitdefender-total-security-2026-04-11/findings/005-safeelevatedrun-path-traversal.md
  submission_ref: bugcrowd:59aada4c-64d7-4215-851f-03ebde5d0629
  bypasses_required:
  - Caller must be BD-Authenticode-signed (msgbus same_sign + trusted_client_process server-side rules). Reachable from bdagent/bduserhost/seccenter
    via process injection, but bdprivmon.sys + bddci4.sys block standard injection patterns from a non-Admin context.
  - 'If injecting from non-BD process: defeat bdprivmon.sys VAD scan (kernel-mode unsigned-IMAGE-VAD detector) and bddci4.sys
    ObRegisterCallbacks handle-strip on PROCESS_VM_OPERATION/WRITE/DUP_HANDLE.'
  poc:
    status: built
    path: engagements/bitdefender-total-security-2026-04-11/pocs/005/
    commands: '# Build the codepoint-identical mimic of FUN_18000f5d0 + FUN_18000f440

      x86_64-w64-mingw32-gcc -O2 -municode -o isinfolder_mimic.exe isinfolder_mimic.c

      # Or run the Python equivalent

      python3 isinfolder_mimic.py

      '
    notes: 'Mimic harness deterministically reproduces the algorithmic bug without invoking BD code. Captured output in evidence_isinfolder_mimic_output.txt:
      IsInFolder(traversal)=TRUE → resolves to c:\windows\system32\cmd.exe.'
  outcome:
    boundary_crossed: unverified
    evidence: engagements/bitdefender-total-security-2026-04-11/pocs/005/evidence_isinfolder_mimic_output.txt
    notes: Algorithmic bug deterministically demonstrated. Full LPE chain (standard user → SYSTEM execution) NOT reproduced
      because bdprivmon+bddci4 block injection into BD-signed peers from non-admin context. Need msgbus auth bypass or admin-context
      injection (separate finding).
  notes: 'Submitted 2026-05-09 as Bugcrowd P3 conservative-framing (primitive proven, end-to-end chain not reproduced). Open
    angles flagged for vendor in the submission: msgbus wire-protocol auth check beyond PEB ImagePathName, seccenter.exe COM
    activation flow, BD user-launchable tools that may take attacker-controllable path arguments (bdfvwiz.exe, bdfvcl.exe,
    agentcontroller.exe, installer.exe), and the update mechanism via updcenter.exe.

    '
