binary: safeelevatedrun.dll
display_name: Bitdefender SafeElevatedRun
product: bitdefender-total-security
description: 'Helper DLL loaded by bdappsrv (the SYSTEM-context elevation server hosted in bdservicehost.exe) to spawn elevated
  processes. Exposes the `CElevatedOperationsClient::RunAsync` interface via msgbus IPC; performs a trust check (ExePath::IsTrusted
  -> ExePath::IsInFolder + WinVerifyTrust) before invoking CreateProcessAsUserW with a SYSTEM token.

  '
canonical_path: C:\Program Files\Bitdefender\Bitdefender Security App\safeelevatedrun.dll
arch: x64
platform: windows
binary_kind: dll
trust_boundary: SYSTEM (bdappsrv) <- BD-signed user-context process (bdagent / bduserhost / seccenter) <- standard user
process_model:
  loaded_by: bdappsrv (in bdservicehost.exe)
  principal: SYSTEM
  start_trigger: service_start_or_demand_when_msgbus_msg_received
  parent_processes:
  - name: bdservicehost.exe
    principal: SYSTEM
    role: SCM-launched host
  ipc_peers:
  - name: bdagent.exe
    principal: Admin (no PPL)
    via: msgbus IPC pipe local\msgbus\bdappsrv
  - name: seccenter.exe
    principal: loggedInUser
    via: msgbus IPC pipe local\msgbus\bdappsrv
  - name: bduserhost.exe
    principal: loggedInUser
    via: msgbus IPC pipe local\msgbus\bdappsrv
  impersonation_seen: false
  ppl_protected: false
