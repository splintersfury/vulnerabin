defenses:
- class_id: I-002
  defense_expected: msgbus same_sign + trusted_client_process server-side rules; SDDL on the pipe restricting to BD principal
  observed: same_sign and trusted_client_process both registered (msgbus rule registry FUN_18003fd10). SDDL on the pipe is
    permissive (any local process can connect; rules enforce after connect).
  gap: rules are at the application layer, not the kernel ACL layer; bypassable via injection into a co-signed peer
  bypass_attempts: PEB ImagePathName masquerade attempted, defeated by trusted_client_process which uses kernel image path.
    Process-hollowing not yet attempted.
- class_id: T-005
  defense_expected: GetFullPathNameW or PathCanonicalize before prefix-compare in IsInFolder
  observed: wcsncmp prefix check on uncanonicalized path; FUN_18000f5d0 line 232; normalizer FUN_18000f440 only lowercases
    / slash-flips / strips quotes
  gap: YES — confirmed exploitable; the BDTS 005 finding
  bypass_attempts: ../../.. traversal works; mimic harness deterministic; submitted Bugcrowd 59aada4c
- class_id: T-006
  defense_expected: co-signature check on caller's image
  observed: same_sign rule present in msgbus registry
  gap: bypassable via injection into a co-signed peer (bdagent.exe in particular)
  bypass_attempts: bdprivmon.sys + bddci4.sys block standard injection patterns from non-Admin context; injection from Admin
    works (separate finding)
