chains:
- id: CHAIN-001
  title: Config injection + BDLogging junction → arbitrary SYSTEM file write
  source_id: SRC-001
  sink_id: SNK-001
  conditions:
  - Standard user pre-creates C:\ProgramData\Bitdefender\com.bitdefender.superapp\config_files\ as NTFS junction redirecting
    to attacker-controlled location
  - Drops attacker-crafted .json with `log_dir` field pointing at desired SYSTEM-write target
  - Restarts ProductAgentService.exe (sc stop + sc start, or wait for service watchdog)
  - Service reads config from junction-redirected path
  - Service uses log_dir from config to write logs in SYSTEM context, following any junction in BDLogging path
  impact: Arbitrary SYSTEM file write (e.g., creating a SYSTEM-owned file under C:\Windows\System32\)
  cwe:
  - CWE-269
  - CWE-22
  - CWE-732
  severity: P3
  cvss: 7.8 / AV:L/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:H
  status: confirmed
  confirmed_in_version: 27.0.x
  finding_ref: (prior engagement) Bugcrowd 791bd4d8-8a22-4bf3-9ad5-14438c4e9d76
  submission_ref: bugcrowd:791bd4d8 ($1,000 paid)
  bypasses_required:
  - Default Windows ACL on C:\ProgramData grants BUILTIN\Users:(CI)(WD,AD,WEA,WA) — no bypass needed for the junction primitive
  - ProductAgentService.exe is NOT in bdprivmon's protected-process list — so injection-based variants also work from Admin
    context
  poc:
    status: tested
    path: (prior engagement) bdpas_junction_poc/
    commands: 'Standard PowerShell: mkdir junction-target; mklink /J <config_files path> junction-target; <drop crafted json>;
      sc stop bdpas; sc start bdpas'
    notes: Reproduced live on lab VM; SYSTEM-owned file appeared in junction target.
  outcome:
    boundary_crossed: 'yes'
    evidence: (prior engagement) recorded in submission writeup
    notes: Standard user → SYSTEM file write proven end-to-end. Vendor paid $1,000 P3.
  notes: Anchor case for the F-001 + F-002 chain pattern across BDTS. Variants of this same shape exist in WatchDog.exe (BDLogging
    surface confirmed via auto-enumerator).
  capability_id: CAP-001
