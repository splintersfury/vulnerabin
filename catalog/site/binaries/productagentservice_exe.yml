    via: dynamic_LoadLibrary
    role: ''
  inputs:
  - id: INP-001
    kind: file_read
    path: C:\ProgramData\Bitdefender\com.bitdefender.superapp\config_files\<name>.json
    direction: read
    attacker_reachable: low_priv_user
    reachability: Path parent does not exist on fresh install; default ProgramData ACL grants Users:(WD,AD) → standard user
      can pre-create parent as a junction
    notes: Discovered via ProcMon NAME-NOT-FOUND filter while restarting service; confirmed by static config-loader strings
      ("superapp.json", "config_files\\")
  - id: INP-002
    kind: file_write
    path: C:\ProgramData\BdLogging\<sub>\<name>.log
    direction: write
    attacker_reachable: low_priv_user
    reachability: BDLogging library auto-creates the parent if missing — same junction primitive as INP-001 on the write side
    notes: Surface shared with WatchDog.exe, bdntwrk.exe, DiscoverySrv.exe — same library, same bug shape
  - id: INP-003
    kind: ipc_msgbus
    path: 'msgbus channel (peer: bdservicehost)'
    direction: bidirectional
    attacker_reachable: 'no'
    reachability: msgbus auth rules (T-006 same_sign / T-004 trusted_client) bind only signed BD peers — not directly attacker-reachable
      from non-BD context
    notes: Listed for completeness; relevant if a different BD-signed peer is compromised
  - id: INP-004
    kind: registry_read
    path: HKLM\SOFTWARE\Bitdefender\...
    direction: read
    attacker_reachable: 'no'
    reachability: HKLM SOFTWARE\Bitdefender DACL is admin-only on BDTS installs (verified via accesschk -k)
    notes: ''
  - id: INP-005
    kind: scm_control
    path: ServiceMain control codes (start/stop/pause)
    direction: in
    attacker_reachable: 'no'
    reachability: Service has default DACL — only Administrators can sc start/stop directly. BUT standard user can crash +
      watchdog will restart.
    notes: Standard user can effectively trigger reload by crashing, or by simply waiting for boot.
