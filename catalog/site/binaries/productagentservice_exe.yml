  behavior: 'On service start: registers SCM handler, loads ProductAgent.dll, calls its init.

    ProductAgent reads the superapp.json config files (INP-001), parses each with rapidjson,

    extracts log_dir field and other policy. Hands log_dir to BDLogging which opens the

    log file for append (INP-002). Spawns 3 worker threads for policy evaluation. Joins

    msgbus on connect, no inbound auth-bound dispatch table observed.

    NOT in bdprivmon''s protected-process allowlist (verified by reading the BdPrivMon.sys

    registered allowlist at runtime) — so injection from Admin context is allowed.

    '
