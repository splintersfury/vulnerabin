binary: ProductAgentService.exe
display_name: Bitdefender ProductAgentService (the PAS-paid finding host)
description: SYSTEM-context Bitdefender service that hosts the ProductAgent.dll. Notable as the host for the paid 2026-03
  finding (config injection + log junction → arbitrary SYSTEM file write, $1,000 P3). NOT in bdprivmon's protected-process
  list, which is the gap that enables injection from Admin context for variant findings.
canonical_path: C:\Program Files\Bitdefender Agent\27.1.1.28_0\ProductAgentService.exe
arch: x64
platform: windows
binary_kind: exe
trust_boundary: SYSTEM (BD service)
reverse_engineering:
  entrypoint: wWinMain @ 0x140001a30 → ServiceMain @ 0x140012a0 (registered with SCM as "ProductAgentService")
  loaded_modules:
  - name: ProductAgent.dll
    via: static_import
    role: All real logic — config loader, policy engine, BDLogging consumer
  - name: BDLogging.dll
    via: static_import
    role: Shared logging library — writes to log_dir read from JSON config (the bug surface)
  - name: msgbus.dll
    via: dynamic_LoadLibraryW
    role: IPC transport to bdservicehost / other vendor processes
  - name: udel.dll
    via: dynamic_LoadLibraryW
    role: Bitdefender update / delivery client
  - name: api-ms-win-core-synch-l1-2-0.dll
    via: dynamic_LoadLibrary
    role: ''
