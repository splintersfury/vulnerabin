product: bitdefender-total-security
display_name: Bitdefender Total Security
vendor: Bitdefender
description: 'Consumer endpoint security suite. Multi-process architecture: SYSTEM-context
  service host (bdservicehost.exe) loading multiple service DLLs (bdappsrv, bdappservice,
  etc.); kernel drivers (bdprivmon, bddci4, trufos) for self-protection and AV operations;
  Admin / user-context UI processes (bdagent, seccenter, bduserhost). IPC backbone
  is msgbus (named pipe `local\msgbus\bdappsrv`) with application-layer auth rules
  (same_sign, trusted_client_process, trusted_client_path, trusted_parent_process,
  admin_client, admin_write_client_folder).

  '
