architecture_narrative:
  summary: 'Bitdefender Total Security is a Windows consumer endpoint security suite
    built as a multi-process system: a SYSTEM service host (bdservicehost.exe) loading
    service DLLs, kernel drivers (bdprivmon.sys, bddci4.sys, trufos.sys) for self-protection
    and AV enforcement, and Admin/user-context UI processes (bdagent.exe, seccenter.exe,
    bduserhost.exe). Components talk to each other over the msgbus named pipe `local\msgbus\bdappsrv`,
    with application-layer auth rules (same_sign, trusted_client_process, trusted_client_path,
    trusted_parent_process, admin_client, admin_write_client_folder) gating who can
    call what.'
  data_flow_prose: An external attacker reaches the suite by either (a) connecting
    to the msgbus named pipe `local\msgbus\bdappsrv` from a low-privileged process
    and sending a message that an application-layer auth rule misclassifies as trusted,
    or (b) issuing SCM control codes that bdservicehost.exe dispatches through service__on_control_handler.
    From there, control flows into bdservicehost.exe's privileged dispatch surface,
    which can install services, mutate service configs, start arbitrary services as
    SYSTEM, load DLLs into the SYSTEM process, and write files from SYSTEM context.
    The kernel drivers sit underneath and are reached either by IOCTL from user-mode
    peers or by file-system / process-callback hooks they install at boot.
  binary_roles:
  - stem: bdservicehost.exe
    role: SYSTEM-context Bitdefender service host that receives control commands,
      verifies signed callers, and dispatches service installs, process starts, and
      DLL loads.
