  trust_boundaries:
  - "Standard user (AU) \u2192 SYSTEM via named pipe `local\\msgbus\\bdappsrv` (msgbus\
    \ application-layer auth rules: same_sign / trusted_client_process / trusted_client_path\
    \ / trusted_parent_process / admin_client / admin_write_client_folder)"
  - "Standard user (AU) \u2192 SYSTEM via SCM control codes dispatched through bdservicehost.exe!service__on_control_handler\
    \ (SCM ACL on the service)"
  - "User-mode (any principal) \u2192 kernel via IOCTLs to bdprivmon.sys / bddci4.sys\
    \ / trufos.sys (device DACL \u2014 not yet audited)"
  - "SYSTEM service host \u2192 on-disk DLLs via LoadLibraryByName / vb_load_bdch_dll_resolve_exports\
    \ (Authenticode + catalog verification through verify_authenticode_signature /\
    \ verify_file_trust / verify_file_via_catalog)"
  - "SYSTEM service host \u2192 installed services via service_manager_install_service\
    \ / change_service_config2_inner / set_service_launch_type (no boundary \u2014\
    \ already SYSTEM, but reachable from the IPC entry above)"
  attack_surface_primary: "The highest-leverage entry point is bdservicehost.exe's\
    \ SCM control handler `service__on_control_handler` and the parallel msgbus listener\
    \ it backs: a standard user who can either send an SCM control code or get a message\
    \ past the msgbus auth rules reaches a dispatch surface that calls service_manager_install_service,\
    \ change_service_config2_inner, set_service_launch_type / start_service, install_bdelam_certificate,\
    \ and LoadLibraryByName from SYSTEM context. End-to-end, that means a low-privileged\
    \ attacker with one accepted message can install an arbitrary Windows service,\
    \ flip an existing service's launch config, install an ELAM certificate, or load\
    \ a chosen DLL into the SYSTEM process \u2014 full LPE in a single hop. The signed-caller\
    \ verification path (verify_authenticode_signature / verify_file_trust / verify_file_via_catalog)\
    \ is the load-bearing defense for both the DLL-load and the IPC-trust decisions,\
    \ so any TOCTOU, catalog confusion, or hardlink-swap weakness in those checks\
    \ collapses the whole boundary."
